<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Balance Buddy</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
<style>
  :root{--ink:#0B1F3F;--paper:#FBFAF6;--gold:#B68A2E;--muted:#5C667A;--line:#E6E2D7}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
  .mark{width:60px;height:60px;border-radius:14px;background:var(--ink);display:inline-flex;align-items:center;justify-content:center;margin:0 auto 26px;position:relative}
  .mark b{font-family:Georgia,'Times New Roman',serif;color:var(--paper);font-size:36px;line-height:1}
  .mark i{position:absolute;right:13px;bottom:15px;width:7px;height:7px;border-radius:50%;background:var(--gold)}
  .code{font-family:ui-monospace,monospace;letter-spacing:.3em;font-size:13px;color:var(--gold);text-transform:uppercase;margin-bottom:14px}
  h1{font-family:Georgia,'Times New Roman',serif;font-size:clamp(28px,7vw,44px);font-weight:700;line-height:1.1;margin-bottom:14px}
  p{color:var(--muted);font-size:16px;line-height:1.6;max-width:440px;margin:0 auto 28px}
  a.btn{display:inline-block;background:var(--ink);color:var(--paper);text-decoration:none;font-weight:600;font-size:15px;padding:13px 26px;border-radius:10px}
  a.btn:hover{background:#0f284f}
</style>
</head>
<body>
  <main>
    <div class="mark"><b>B</b><i></i></div>
    <div class="code">Error 404</div>
    <h1>This page took the day off.</h1>
    <p>The page you're after doesn't exist or has moved. Let's get you back to the cohort.</p>
    <a class="btn" href="/">← Back to Balance Buddy</a>
  </main>
</body>
</html>
